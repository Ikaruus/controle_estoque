<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Controle de Estoque</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1f2937, #111827);
            color: white;
        }

        .card {
            border-radius: 15px;
        }

        .navbar {
            background-color: #0d1117;
        }

        footer {
            margin-top: 50px;
            padding: 20px;
            text-align: center;
            color: #aaa;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark shadow">
    <div class="container">
        <span class="navbar-brand">
            <i class="bi bi-box-seam"></i> Controle de Estoque
        </span>
    </div>
</nav>

<div class="container mt-5">

    <div class="text-center mb-5">
        <h1 class="fw-bold">Sistema de Gerenciamento</h1>
        <p class="text-secondary">Backend em FastAPI com interface moderna</p>
    </div>

    <div class="card shadow-lg bg-light text-dark">
        <div class="card-body">

            <div class="d-flex justify-content-between mb-3">
                <h5 class="card-title">Produtos Cadastrados</h5>
                <button class="btn btn-success">
                    <i class="bi bi-plus-circle"></i> Novo Produto
                </button>
            </div>

            <table class="table table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Quantidade</th>
                        <th>Preço</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td>Notebook</td>
                        <td>10</td>
                        <td>R$ 3500</td>
                        <td>
                            <button class="btn btn-sm btn-warning">
                                <i class="bi bi-pencil"></i>
                            </button>
                            <button class="btn btn-sm btn-danger">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>

        </div>
    </div>

</div>

<footer>
    Desenvolvido por Dikson Ikaro • 2026
</footer>

</body>
</html>
